<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 860 542" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    .m { font-family: 'Cascadia Code','Fira Code','JetBrains Mono',Consolas,monospace; font-size: 12.5px; }
  </style>
  <!-- typing reveal: grows from x=0, text starts at x=40 -->
  <clipPath id="cr">
    <rect x="0" y="110" width="0" height="22">
      <animate attributeName="width" dur="15s" repeatCount="indefinite"
        keyTimes="0;0.066;0.067;0.167;0.800;0.820;1"
        values="0;0;0;320;320;0;0"/>
    </rect>
  </clipPath>
</defs>

<!-- terminal bg -->
<rect width="860" height="542" rx="10" fill="#1e1e2e"/>
<!-- title bar -->
<rect width="860" height="38" rx="10" fill="#181825"/>
<rect y="20" width="860" height="18" fill="#181825"/>
<!-- traffic lights -->
<circle cx="22" cy="19" r="7" fill="#f38ba8"/>
<circle cx="42" cy="19" r="7" fill="#f9e2af"/>
<circle cx="62" cy="19" r="7" fill="#a6e3a1"/>
<!-- title -->
<text class="m" x="430" y="24" text-anchor="middle" fill="#6c7086" font-size="12">apitype</text>

<!-- ── HEADER ── -->
<text class="m" x="26" y="72" opacity="0">
  <animate attributeName="opacity" dur="15s" repeatCount="indefinite" keyTimes="0;0.019;0.021;0.800;0.867;1" values="0;0;1;1;0;0"/>
  <tspan fill="#89dceb" font-weight="bold">  apitype</tspan><tspan fill="#6c7086">  v0.2.0</tspan>
</text>
<text class="m" x="26" y="90" fill="#6c7086" opacity="0">
  <animate attributeName="opacity" dur="15s" repeatCount="indefinite" keyTimes="0;0.026;0.027;0.800;0.867;1" values="0;0;1;1;0;0"/>
  TypeScript types · Zod · TypeBox · JSON Schema — from any API
</text>

<!-- ── COMMAND LINE ── -->
<text class="m" x="26" y="124" fill="#6c7086" opacity="0">
  <animate attributeName="opacity" dur="15s" repeatCount="indefinite" keyTimes="0;0.052;0.053;0.800;0.867;1" values="0;0;1;1;0;0"/>
  $
</text>
<g clip-path="url(#cr)">
  <text class="m" x="40" y="124" fill="#cdd6f4">node dist/cli.js user.json --name User</text>
</g>
<!-- blinking cursor: appears when typing ends (t=2.5s), blinks 3×, vanishes at t=2.8s -->
<rect x="313" y="112" width="2" height="14" fill="#cdd6f4" opacity="0">
  <animate attributeName="opacity" dur="15s" repeatCount="indefinite"
    keyTimes="0;0.166;0.167;0.172;0.178;0.183;0.188;0.193;1"
    values="0;0;1;0;1;0;1;0;0"/>
</rect>

<!-- ── SUCCESS ── -->
<text class="m" x="26" y="160" opacity="0">
  <animate attributeName="opacity" dur="15s" repeatCount="indefinite" keyTimes="0;0.192;0.193;0.800;0.867;1" values="0;0;1;1;0;0"/>
  <tspan fill="#a6e3a1">✓ Generated </tspan><tspan fill="#cdd6f4" font-weight="bold">User</tspan><tspan fill="#6c7086"> · requires </tspan><tspan fill="#89dceb">zod</tspan>
</text>

<!-- ── SEPARATOR 1 ── -->
<text class="m" x="26" y="196" fill="#45475a" opacity="0">
  <animate attributeName="opacity" dur="15s" repeatCount="indefinite" keyTimes="0;0.212;0.213;0.800;0.867;1" values="0;0;1;1;0;0"/>
  ────────────────────────────────────────────────────────────────
</text>

<!-- ── import ── -->
<text class="m" x="26" y="214" opacity="0">
  <animate attributeName="opacity" dur="15s" repeatCount="indefinite" keyTimes="0;0.225;0.227;0.800;0.867;1" values="0;0;1;1;0;0"/>
  <tspan fill="#cba6f7">import</tspan><tspan fill="#cdd6f4"> { z } </tspan><tspan fill="#cba6f7">from</tspan><tspan fill="#a6e3a1"> 'zod'</tspan>
</text>

<!-- ── export const ── -->
<text class="m" x="26" y="250" opacity="0">
  <animate attributeName="opacity" dur="15s" repeatCount="indefinite" keyTimes="0;0.239;0.240;0.800;0.867;1" values="0;0;1;1;0;0"/>
  <tspan fill="#cba6f7">export const</tspan><tspan fill="#89b4fa"> userSchema</tspan><tspan fill="#cdd6f4"> = </tspan><tspan fill="#89dceb">z.object</tspan><tspan fill="#cdd6f4">({</tspan>
</text>

<!-- ── fields ── -->
<text class="m" x="26" y="268" opacity="0">
  <animate attributeName="opacity" dur="15s" repeatCount="indefinite" keyTimes="0;0.252;0.253;0.800;0.867;1" values="0;0;1;1;0;0"/>
  <tspan fill="#cdd6f4">  id: </tspan><tspan fill="#89dceb">z.string().uuid()</tspan><tspan fill="#cdd6f4">,</tspan>
</text>
<text class="m" x="26" y="286" opacity="0">
  <animate attributeName="opacity" dur="15s" repeatCount="indefinite" keyTimes="0;0.265;0.267;0.800;0.867;1" values="0;0;1;1;0;0"/>
  <tspan fill="#cdd6f4">  name: </tspan><tspan fill="#89dceb">z.string()</tspan><tspan fill="#cdd6f4">,</tspan>
</text>
<text class="m" x="26" y="304" opacity="0">
  <animate attributeName="opacity" dur="15s" repeatCount="indefinite" keyTimes="0;0.279;0.280;0.800;0.867;1" values="0;0;1;1;0;0"/>
  <tspan fill="#cdd6f4">  email: </tspan><tspan fill="#89dceb">z.string().email()</tspan><tspan fill="#cdd6f4">,</tspan>
</text>
<text class="m" x="26" y="322" opacity="0">
  <animate attributeName="opacity" dur="15s" repeatCount="indefinite" keyTimes="0;0.292;0.293;0.800;0.867;1" values="0;0;1;1;0;0"/>
  <tspan fill="#cdd6f4">  age: </tspan><tspan fill="#89dceb">z.number().int().nonnegative()</tspan><tspan fill="#cdd6f4">,</tspan>
</text>
<text class="m" x="26" y="340" opacity="0">
  <animate attributeName="opacity" dur="15s" repeatCount="indefinite" keyTimes="0;0.306;0.307;0.800;0.867;1" values="0;0;1;1;0;0"/>
  <tspan fill="#cdd6f4">  avatar: </tspan><tspan fill="#89dceb">z.string().url()</tspan><tspan fill="#cdd6f4">,</tspan>
</text>
<text class="m" x="26" y="358" opacity="0">
  <animate attributeName="opacity" dur="15s" repeatCount="indefinite" keyTimes="0;0.319;0.320;0.800;0.867;1" values="0;0;1;1;0;0"/>
  <tspan fill="#cdd6f4">  verified: </tspan><tspan fill="#89dceb">z.boolean()</tspan><tspan fill="#cdd6f4">,</tspan>
</text>
<text class="m" x="26" y="376" opacity="0">
  <animate attributeName="opacity" dur="15s" repeatCount="indefinite" keyTimes="0;0.332;0.333;0.800;0.867;1" values="0;0;1;1;0;0"/>
  <tspan fill="#cdd6f4">  bio: </tspan><tspan fill="#89dceb">z.null()</tspan><tspan fill="#cdd6f4">,</tspan>
</text>
<text class="m" x="26" y="394" opacity="0">
  <animate attributeName="opacity" dur="15s" repeatCount="indefinite" keyTimes="0;0.346;0.347;0.800;0.867;1" values="0;0;1;1;0;0"/>
  <tspan fill="#cdd6f4">  createdAt: </tspan><tspan fill="#89dceb">z.string().datetime()</tspan><tspan fill="#cdd6f4">,</tspan>
</text>
<text class="m" x="26" y="412" opacity="0">
  <animate attributeName="opacity" dur="15s" repeatCount="indefinite" keyTimes="0;0.359;0.360;0.800;0.867;1" values="0;0;1;1;0;0"/>
  <tspan fill="#cdd6f4">  tags: </tspan><tspan fill="#89dceb">z.array(z.string())</tspan><tspan fill="#cdd6f4">,</tspan>
</text>
<text class="m" x="26" y="430" fill="#cdd6f4" opacity="0">
  <animate attributeName="opacity" dur="15s" repeatCount="indefinite" keyTimes="0;0.372;0.373;0.800;0.867;1" values="0;0;1;1;0;0"/>
  })
</text>

<!-- ── type export ── -->
<text class="m" x="26" y="466" opacity="0">
  <animate attributeName="opacity" dur="15s" repeatCount="indefinite" keyTimes="0;0.385;0.387;0.800;0.867;1" values="0;0;1;1;0;0"/>
  <tspan fill="#cba6f7">export type</tspan><tspan fill="#89b4fa"> User</tspan><tspan fill="#cdd6f4"> = </tspan><tspan fill="#89dceb">z.infer</tspan><tspan fill="#cdd6f4">&lt;</tspan><tspan fill="#cba6f7">typeof</tspan><tspan fill="#89b4fa"> userSchema</tspan><tspan fill="#cdd6f4">&gt;</tspan>
</text>

<!-- ── SEPARATOR 2 ── -->
<text class="m" x="26" y="484" fill="#45475a" opacity="0">
  <animate attributeName="opacity" dur="15s" repeatCount="indefinite" keyTimes="0;0.399;0.400;0.800;0.867;1" values="0;0;1;1;0;0"/>
  ────────────────────────────────────────────────────────────────
</text>

<!-- ── install note ── -->
<text class="m" x="26" y="522" opacity="0">
  <animate attributeName="opacity" dur="15s" repeatCount="indefinite" keyTimes="0;0.412;0.413;0.800;0.867;1" values="0;0;1;1;0;0"/>
  <tspan fill="#6c7086">  Install: </tspan><tspan fill="#89dceb">npm install zod</tspan>
</text>
</svg>
